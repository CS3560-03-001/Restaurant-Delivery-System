spring:
  application:
    name: restaurant-delivery-backend
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/restaurant_delivery}
    username: ${DB_USERNAME:restaurant}
    password: ${DB_PASSWORD:restaurant}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
